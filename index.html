<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Avurudu Countdown</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
 <main class="box">
 <img class="photo" src="photo.jfif" alt="My photo">
 <h1>Avurudu Countdown</h1>
 <h2>2027</h2>
 <p class="sub">Sinhala &amp; Tamil New Year</p>
 <div class="timer">
 <div class="unit"><span id="days">0</span><small>Days</small></div>
 <div class="unit"><span id="hours">0</span><small>Hours</small></div>
 <div class="unit"><span id="minutes">0</span><small>Minutes</small></div>
 <div class="unit"><span id="seconds">0</span><small>Seconds</small></div>
 </div>
 <p id="message"></p>
 </main>
 <script src="script.js"></script>
</body>
</html>

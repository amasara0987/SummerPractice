<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Cricket Scoreboard</title>
 <link rel="stylesheet" href="style.css">
 <link rel="icon" type="image/png" href="favicon.jfif">
</head>
<body>
 <main class="board">
 <h1>Cricket Scoreboard</h1>
 <div class="side-by-side-container">
  <img src="your-image.png" alt="Description of image">
  <h2>SL VS AUS</h2>
  <img src="your-image_1.png" alt="Description of image">
 </div>
 <div class="score">
 <span id="runs">0</span> / <span id="wickets">0</span>
 </div>
 <p class="overs">Balls: <span id="balls">0</span></p>
 <div class="buttons">
 <button onclick="addRuns(1)">+1</button>
 <button onclick="addRuns(2)">+2</button>
 <button onclick="addRuns(4)">+4</button>
 <button onclick="addRuns(6)">+6</button>
 <button class="wicket" onclick="addWicket()">Wicket</button>
 </div>
 <button class="reset" onclick="resetGame()">Reset</button>
 </main>
 <script src="script.js"></script>
</body>
</html>
